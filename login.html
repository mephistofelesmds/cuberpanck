<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВХОД — Cyberpulse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a080c;
            font-family: 'Georgia', serif;
            color: #ece0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 8, 14, 0.9);
            padding: 2rem;
            border-radius: 1.8rem;
            border: 1px solid #2a1f2e;
            box-shadow: 0 4px 40px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #b69ba5;
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            color: #c497aa;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(18, 14, 22, 0.9);
            border: 1px solid #3a1a28;
            border-radius: 1.5rem;
            color: #f0dde0;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: #bc5a7a;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background: rgba(140, 45, 70, 0.7);
            border: 1px solid #9e3b5c;
            border-radius: 2rem;
            color: #f0dde0;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(160, 50, 80, 0.85);
            transform: translateY(-2px);
        }

        .error {
            color: #c55555;
            font-size: 0.8rem;
            text-align: center;
            margin: 0.5rem 0;
        }

        .users-list {
            margin: 1rem 0;
            padding: 0.5rem;
            background: rgba(30, 18, 26, 0.4);
            border-radius: 1rem;
        }

        .user-select {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
            margin: 0.3rem 0;
            background: rgba(18, 14, 22, 0.6);
            border-radius: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-select:hover {
            background: rgba(100, 40, 60, 0.4);
            transform: translateX(4px);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a2a4a, #3a1a28);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
        }

        .user-username {
            font-size: 0.7rem;
            color: #a07085;
        }

        .user-role {
            font-size: 0.6rem;
            color: #bc5a7a;
        }

        .or-divider {
            text-align: center;
            color: #604050;
            margin: 1rem 0;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ДОСТУП<span style="color:#c5457a">.</span></h1>
        <div class="subtitle">киберпространство ждёт</div>
        
        <div class="error" id="loginError"></div>
        
        <div class="users-list" id="usersList"></div>
        
        <div class="or-divider">━━━ или введите логин вручную ━━━</div>
        
        <div class="form-group">
            <label>@юзернейм</label>
            <input type="text" id="username" placeholder="ваш идентификатор">
        </div>
        <div class="form-group">
            <label>пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()">Войти</button>
        
        <div class="or-divider" style="margin-top:1.5rem">доступные аккаунты</div>
        <div style="font-size:0.7rem; color:#604050; text-align:center">
            moder | bio | nath | lacey_off | flint | picdez | mr.Lewis | lolitaа
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.textContent = 'заполните все поля';
                return;
            }
            
            errorDiv.textContent = 'Проверка...';
            
            const result = await AuthManager.login(username, password);
            
            if (!result.success) {
                errorDiv.textContent = result.error;
                return;
            }
            
            window.location.href = 'profile.html';
        }

        function renderUsersList() {
            const users = AuthManager.getAllUsers();
            const container = document.getElementById('usersList');
            
            if (!container) return;
            
            container.innerHTML = '<div style="font-size:0.7rem; color:#c497aa; margin-bottom:0.5rem">▼ выберите аккаунт</div>';
            
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-select';
                div.onclick = () => {
                    document.getElementById('username').value = user.username;
                    document.getElementById('password').focus();
                };
                
                const initial = (user.display_name || user.username).charAt(0).toUpperCase();
                
                div.innerHTML = `
                    <div class="user-avatar">${initial}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.display_name || user.username)}</div>
                        <div class="user-username">@${escapeHtml(user.username)}</div>
                        <div class="user-role">${user.role === 'admin' ? 'администратор' : 'пользователь'}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderUsersList();
            
            const session = AuthManager.loadSession();
            if (session?.active_user) {
                window.location.href = 'profile.html';
            } else {
                document.getElementById('username').focus();
            }
        });

        document.getElementById('password')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
