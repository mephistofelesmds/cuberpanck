<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ВХОД — Cyberpulse Feed</title>
    
    <style>
        :root {
            --bg-deep: #0a080c;
            --text-primary: #ece0f0;
            --text-secondary: #b6a0b6;
            --accent-rose: #9e3b5c;
            --accent-glow: rgba(160, 60, 100, 0.45);
            --border-light: #2a1f2e;
            --card-hover-border: #bc5a7a;
            --input-bg: rgba(18, 14, 22, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(rgba(120, 60, 100, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 60, 100, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(90, 30, 60, 0.2), transparent 60%),
                        radial-gradient(ellipse at 80% 70%, rgba(40, 20, 50, 0.25), transparent 55%),
                        rgba(0, 0, 0, 0.83);
            pointer-events: none;
        }

        .decorative-circle {
            position: fixed;
            border-radius: 50%;
            border: 1.5px solid rgba(160, 80, 120, 0.15);
            pointer-events: none;
            animation: circleFloat 20s ease-in-out infinite;
        }

        .decorative-circle.c1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -80px;
        }

        .decorative-circle.c2 {
            width: 200px;
            height: 200px;
            bottom: -60px;
            left: -60px;
            animation-delay: -7s;
        }

        @keyframes circleFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -20px) rotate(3deg); }
            50% { transform: translate(-10px, 15px) rotate(-2deg); }
            75% { transform: translate(-20px, -10px) rotate(1deg); }
        }

        .login-container, .register-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(10, 8, 14, 0.7);
            padding: 2.5rem 2rem;
            border-radius: 1.8rem;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(100, 40, 70, 0.25);
            backdrop-filter: blur(8px);
            animation: containerGlow 1s ease-out;
        }

        .register-container {
            max-width: 520px;
        }

        @keyframes containerGlow {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f0dde0;
            letter-spacing: 2px;
            margin-bottom: 0.4rem;
        }

        .login-header .dot {
            color: #c5457a;
        }

        .login-header .subtitle {
            font-size: 0.8rem;
            color: #b69ba5;
            font-style: italic;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            color: #c497aa;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .form-label .hint {
            color: #806070;
            font-size: 0.7rem;
            text-transform: none;
            letter-spacing: normal;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid #3a1a28;
            border-radius: 1.5rem;
            color: #f0dde0;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: #bc5a7a;
            box-shadow: 0 0 15px rgba(160, 60, 100, 0.3);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: #604050;
        }

        .error-message {
            color: #c55555;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }

        .success-message {
            color: #6a9a5a;
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: rgba(140, 45, 70, 0.7);
            border: 1px solid #9e3b5c;
            border-radius: 2rem;
            color: #f0dde0;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: rgba(160, 50, 80, 0.85);
            border-color: #bc5a7a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), 0 0 18px rgba(160, 60, 100, 0.4);
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #806070;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }

        .back-link:hover {
            color: #c497aa;
        }

        .toggle-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .toggle-link a {
            color: #bc5a7a;
            text-decoration: none;
            transition: color 0.3s;
        }

        .toggle-link a:hover {
            color: #e07a9a;
            text-decoration: underline;
        }

        .demo-hint {
            text-align: center;
            color: #604050;
            font-size: 0.7rem;
            margin-top: 1rem;
            font-style: italic;
        }

        .suggestions-box {
            margin-top: 0.5rem;
            padding: 0.8rem;
            background: rgba(30, 18, 26, 0.6);
            border-radius: 1rem;
            border: 1px solid #3a1a28;
            display: none;
        }

        .suggestions-title {
            font-size: 0.7rem;
            color: #c497aa;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .suggestions-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .suggestion-item {
            background: rgba(100, 40, 60, 0.3);
            border: 1px solid #6a2a4a;
            border-radius: 1rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: monospace;
        }

        .suggestion-item:hover {
            background: rgba(160, 60, 100, 0.5);
            border-color: #bc5a7a;
            transform: translateY(-1px);
        }

        .username-preview {
            display: inline-block;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            color: #806070;
            font-family: monospace;
        }

        .username-preview span {
            color: #bc5a7a;
        }
    </style>
</head>
<body>
    <div class="decorative-circle c1"></div>
    <div class="decorative-circle c2"></div>

    <!-- Форма входа -->
    <div id="loginForm" class="login-container">
        <div class="login-header">
            <h1>ДОСТУП<span class="dot">.</span></h1>
            <div class="subtitle">вход в киберпространство</div>
        </div>

        <div class="error-message" id="loginError"></div>

        <div class="form-group">
            <label class="form-label" for="username">@юзернейм</label>
            <input type="text" id="username" class="form-input" placeholder="ваш уникальный идентификатор" autocomplete="username">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Пароль</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="login-btn" onclick="handleLogin()">Войти в систему</button>

        <div class="toggle-link">
            <a href="#" onclick="showRegister(); return false;">→ создать аккаунт</a>
        </div>

        <a href="index.html" class="back-link">← назад в меню</a>
        <div class="demo-hint">тестовый аккаунт: @demo / demo123</div>
    </div>

    <!-- Форма регистрации -->
    <div id="registerForm" class="register-container" style="display: none;">
        <div class="login-header">
            <h1>РЕГИСТРАЦИЯ<span class="dot">.</span></h1>
            <div class="subtitle">создание идентификатора</div>
        </div>

        <div class="error-message" id="registerError"></div>

        <div class="form-group">
            <label class="form-label" for="regUsername">
                @юзернейм <span class="hint">(только буквы, цифры и _)</span>
            </label>
            <input type="text" id="regUsername" class="form-input" placeholder="например: cyber_neon, shadow_99" autocomplete="off">
            <div class="username-preview" id="usernamePreview"></div>
            <div class="suggestions-box" id="suggestionsBox">
                <div class="suggestions-title">→ свободные варианты:</div>
                <div class="suggestions-list" id="suggestionsList"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="regPassword">Пароль</label>
            <input type="password" id="regPassword" class="form-input" placeholder="мин. 4 символа" autocomplete="new-password">
        </div>

        <div class="form-group">
            <label class="form-label" for="regDisplayName">Отображаемое имя</label>
            <input type="text" id="regDisplayName" class="form-input" placeholder="как вас называть">
        </div>

        <div class="form-group">
            <label class="form-label" for="regBio">О себе (необязательно)</label>
            <textarea id="regBio" class="form-textarea" placeholder="расскажите о себе..."></textarea>
        </div>

        <button class="login-btn" onclick="handleRegister()">Создать аккаунт</button>

        <div class="toggle-link">
            <a href="#" onclick="showLogin(); return false;">← уже есть аккаунт? войти</a>
        </div>

        <a href="index.html" class="back-link">← назад в меню</a>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let usernameCheckTimeout;

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = 'заполните все поля';
                return;
            }
            
            try {
                const session = await API.login(username, password);
                window.location.href = 'profile.html';
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const displayName = document.getElementById('regDisplayName').value.trim();
            const bio = document.getElementById('regBio').value.trim();
            const errorDiv = document.getElementById('registerError');
            
            errorDiv.textContent = '';
            
            if (!username || !password || !displayName) {
                errorDiv.textContent = 'заполните все обязательные поля';
                return;
            }
            
            try {
                await API.register({ username, password, display_name: displayName, bio });
                errorDiv.style.color = '#6a9a5a';
                errorDiv.textContent = 'Регистрация успешна! Выполняется вход...';
                
                setTimeout(async () => {
                    await API.login(username, password);
                    window.location.href = 'profile.html';
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        }

        async function checkUsernameAvailability() {
            const username = document.getElementById('regUsername').value.trim();
            const preview = document.getElementById('usernamePreview');
            const suggestionsBox = document.getElementById('suggestionsBox');
            
            if (username.length < 3) {
                preview.innerHTML = '';
                suggestionsBox.style.display = 'none';
                return;
            }
            
            const available = AuthManager.isUsernameAvailable(username);
            
            if (available) {
                preview.innerHTML = `✓ @<span>${username}</span> — свободен`;
                preview.style.color = '#6a9a5a';
                suggestionsBox.style.display = 'none';
            } else {
                preview.innerHTML = `✗ @<span>${username}</span> — уже занят`;
                preview.style.color = '#c55555';
                
                const suggestions = AuthManager.generateUsernameSuggestions(username);
                const suggestionsList = document.getElementById('suggestionsList');
                suggestionsList.innerHTML = suggestions.map(s => 
                    `<div class="suggestion-item" onclick="useSuggestion('${s}')">@${s}</div>`
                ).join('');
                suggestionsBox.style.display = 'block';
            }
        }

        function useSuggestion(username) {
            document.getElementById('regUsername').value = username;
            document.getElementById('usernamePreview').innerHTML = `✓ @<span>${username}</span> — свободен`;
            document.getElementById('usernamePreview').style.color = '#6a9a5a';
            document.getElementById('suggestionsBox').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerError').textContent = '';
            document.getElementById('usernamePreview').innerHTML = '';
            document.getElementById('suggestionsBox').style.display = 'none';
            document.getElementById('regUsername').focus();
        }

        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginError').textContent = '';
            document.getElementById('username').focus();
        }

        // Живая проверка юзернейма
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('regUsername');
            if (usernameInput) {
                usernameInput.addEventListener('input', () => {
                    clearTimeout(usernameCheckTimeout);
                    usernameCheckTimeout = setTimeout(checkUsernameAvailability, 300);
                });
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await AuthManager.createDemoUser();
            
            const session = AuthManager.loadSession();
            if (session && session.active_user) {
                window.location.href = 'profile.html';
                return;
            }
            
            document.getElementById('username').focus();
        });

        document.getElementById('password')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        document.getElementById('regPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
